spring.application.name=bugreproductionrecorder
# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bugtracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:8989}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET:mysupersecretkeymysupersecretkeymysupersecretkey12345678901234567890123456789}
jwt.expiration=86400000





# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}
